##############################
### WINDOWS AND WORKSPACES ###
##############################

# Note: In Hyprland 0.53+, we use 'windowrule' with 'match:' properties.

# -----------------------------------------------------
# 1. Global Safety & Floats
# -----------------------------------------------------

# Fix: 'suppressevent' -> 'suppress_event', and strictly match all classes
#windowrule = suppress_event maximize, match:class .*

# Fix: 'float' now usually needs '1' (true) or 'on'
#windowrule = float 1, match:class ^(kitty)$

# -----------------------------------------------------
# 2. Authentication Agents (Polkit)
# -----------------------------------------------------
# Fix: 'stayfocused' -> 'stay_focused' (snake_case)

windowrule = float 1, match:class ^(polkit-gnome-authentication-agent-1)$
windowrule = center 1, match:class ^(polkit-gnome-authentication-agent-1)$
#windowrule = stay_focused, match:class ^(polkit-gnome-authentication-agent-1)$

windowrule = float 1, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = center 1, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
#windowrule = stay_focused, match:class ^(org.kde.polkit-kde-authentication-agent-1)$

# -----------------------------------------------------
# 3. File Wizards (Thunar & Portals)
# -----------------------------------------------------

# XDG Desktop Portals (GTK/KDE)
windowrule = float 1, match:class ^(xdg-desktop-portal-gtk)$
windowrule = center 1, match:class ^(xdg-desktop-portal-gtk)$
windowrule = size 900 600, match:class ^(xdg-desktop-portal-gtk)$

windowrule = float 1, match:class ^(xdg-desktop-portal-kde)$
windowrule = center 1, match:class ^(xdg-desktop-portal-kde)$
windowrule = size 900 600, match:class ^(xdg-desktop-portal-kde)$

# Thunar "Wizard" Windows
# Note: We must match BOTH class and title. 
# New syntax allows multiple matches in one line, but separate lines are safer for debugging.

# Progress Bar
windowrule = float 1, match:class ^(thunar)$, match:title ^(File Operation Progress)$
windowrule = center 1, match:class ^(thunar)$, match:title ^(File Operation Progress)$

# Confirm Dialog
windowrule = float 1, match:class ^(thunar)$, match:title ^(Confirm to replace files)$
windowrule = center 1, match:class ^(thunar)$, match:title ^(Confirm to replace files)$

# Properties
windowrule = float 1, match:class ^(thunar)$, match:title ^(.*Properties)$
windowrule = center 1, match:class ^(thunar)$, match:title ^(.*Properties)$

# -----------------------------------------------------
# 4. General Dialog Catch-All
# -----------------------------------------------------
# Replaces the deprecated 'windowtype:dialog' with title matching

windowrule = float 1, match:title ^(Open File)$
windowrule = center 1, match:title ^(Open File)$
windowrule = size 900 600, match:title ^(Open File)$

windowrule = float 1, match:title ^(Save As)$
windowrule = center 1, match:title ^(Save As)$
windowrule = size 900 600, match:title ^(Save As)$

windowrule = float 1, match:title ^(Select a File)$
windowrule = center 1, match:title ^(Select a File)$
